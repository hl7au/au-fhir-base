name: (LEGACY) Au base IG Profiles publish->go-publish - all releases

# LEGACY / reference only — SUPERSEDED by build-review-publish.yml (the single pipeline: renders once,
# produces working + milestone Pages previews, and does the gated milestone-only prod publish).
# This is the original self-hosted-EC2 + full 15GB S3 sync pipeline. Tag releases now run
# build-review-publish.yml, so this is manual-dispatch only (kept for emergency/reference). It still
# fetches the combined custom jar so it behaves consistently if ever run.
# INPUTS (see build-review-publish.yml for per-input notes): hl7au/au-fhir-base (IG src) ·
# KyleOps/publications (publish-setup.json + templates) · HL7/fhir-ig-history-template · hl7au/ig-registry.

on:
  workflow_dispatch: {}   # was: push tags '**' — tag releases now run build-review-publish.yml

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout
  
jobs:
  build:
    runs-on: [self-hosted, Linux, X64]
    # use ig publisher base image https://hub.docker.com/r/hl7fhir/ig-publisher-base
    container: 
      image: hl7fhir/ig-publisher-base  
      volumes:
        - /webroot:/webroot
            
    steps:

    # to save load time can build custom image with dependencies and push to docker hub
    - name: install aws cli
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        ./aws/install --update
    
    - name: Get the tag name
      id: get_tag
      run: echo "##[set-output name=tag;]${GITHUB_REF#refs/tags/}"

    - name: Checkout Publications Repository (publish-setup.json + templates)
      uses: actions/checkout@v4
      with:
        repository: KyleOps/publications   # TEMP: revert to hl7au/publications once config+jar merged
        ref: au-pipeline-config             # TEMP: cloud + dynamic-publish-box config (matches custom jar)
        
    - name: Download past versions
      run: |
        aws s3 sync s3://hl7au-fhir-ig /webroot --only-show-errors
        ln -s /webroot webroot   
        mv publish-setup.json ./webroot/
        
    - name: Checkout AU base Repository
      uses: actions/checkout@v4
      with:
        repository: hl7au/au-fhir-base
        path: hl7au/au-fhir-base
        ref: ${{ steps.get_tag.outputs.tag }} # explicit, not usually since the default is to checkout the initiating commit

    - name: Checkout IG History Template Repository
      uses: actions/checkout@v4
      with:
        repository: HL7/fhir-ig-history-template
        path: fhir-history
    
    - name: Checkout IG Registry Repository
      uses: actions/checkout@v4
      with:
        repository: hl7au/ig-registry
        path: ig-registry

    - name: Fetch combined custom IG Publisher jar (TEMPORARY — until the 5 PRs merge)
      run: |
        # TEMP: combined jar (5 opt-in features). Revert to the standard _updatePublisher.sh once merged:
        #   curl -sSL https://raw.githubusercontent.com/HL7/ig-publisher-scripts/main/_updatePublisher.sh | bash -s -- -f -y
        mkdir -p input-cache
        curl -sSL -o input-cache/publisher.jar https://github.com/KyleOps/fhir-ig-publisher/releases/download/au-pipeline-combined/publisher.jar
        echo "publisher.jar: $(du -h input-cache/publisher.jar | cut -f1)"
         
    - name: Basic Publish for Aubase (publication mode → go-publish can reuse it, lever C)
      run: |
          echo "Generating Publish for  Aubase IG..."
          # Render in PUBLICATION mode for the final publish path so go-publish -reuse-build can adopt
          # the output instead of re-rendering. Backward compatible with an older publisher.jar.
          PUBPATH=$(grep -o '"path"[^,}]*' hl7au/au-fhir-base/publication-request.json | head -1 | sed 's/.*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "Publication path: $PUBPATH"
          java -jar input-cache/publisher.jar -ig hl7au/au-fhir-base/ig.ini -publish "$PUBPATH"
      
    - name: Download package-list.json
      run: |
        rm -rf hl7au/au-fhir-base/package-list.json
        URL="https://hl7.org.au/fhir"
        FULL_URL="$URL/package-list.json"
        curl --output webroot/fhir/package-list.json --url $FULL_URL
      
    - name: Generate Package Registry
      run: |
        java -jar input-cache/publisher.jar -generate-package-registry webroot
      
    - name: Run Aubase Go Publisher build
      run:  java -jar ./input-cache/publisher.jar -go-publish -reuse-build -source ./hl7au/au-fhir-base -web ./webroot -history ./fhir-history -registry ./ig-registry/fhir-ig-list.json -templates ./templates
