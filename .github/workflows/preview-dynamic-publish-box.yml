# BRANCH-ONLY workflow (preview/dynamic-publish-box): stages the reworked dynamic publish box
# (HL7/fhir-ig-publisher#1330) on the S3 previews channel so it can be reviewed live, without
# touching the shared pipeline, the combined jar, preprod, or prod.
#
# Uses the REVIEW jar (KyleOps/fhir-ig-publisher release pr-1330-dynamic-publish-box), which is
# exactly upstream master + the PR 1330 commits: stock core, none of the other AU patches, so the
# behaviour on the preview is what an upstream reviewer would get. (Because that jar has no
# -reuse-build, each go-publish renders internally; the run takes ~2 renders.)
#
# What it does: publishes TWO successive versions into ONE webroot (A as working, then B as
# milestone, so B becomes current). That makes A a genuine past version whose pages were baked
# before B existed, so the preview demonstrates the whole story on real AU Base content:
#   - version A's pages: baked with the statement that was accurate when A was published
#     (view-source shows it), corrected at view time by publish-box.js to "superseded by <B>";
#   - version B (current, at the root and its own folder): baked accurate, the script
#     changes nothing (no flicker, correct with JS disabled);
#   - package-list.js + publish-box.js at the IG root; publish-box-pages.json in each version;
#   - ZERO-CHURN proof: the workflow md5-verifies that publishing v2 rewrote nothing in v1's
#     folder, and fails if it did.

name: Preview — dynamic publish box (PR 1330 review jar)

on:
  push:
    branches: [preview/dynamic-publish-box]
  workflow_dispatch:

permissions:
  id-token: write        # OIDC → AWS (S3 previews bucket only)
  contents: read

concurrency:
  group: preview-dynamic-publish-box
  cancel-in-progress: false

env:
  JAR_URL: https://github.com/KyleOps/fhir-ig-publisher/releases/download/pr-1330-dynamic-publish-box/publisher.jar
  TX_SERVER: https://tx.fhir.org
  SLUG: dynamic-publish-box
  VER_A: 6.1.2-ci-build
  VER_B: 6.1.3-ci-build
  PREVIEWS_BUCKET: hl7au-fhir-ig-previews
  AWS_ROLE: arn:aws:iam::966489602583:role/ghactions_publications_oidc
  AWS_REGION: ap-southeast-2

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout IG source
        uses: actions/checkout@v4
        with: { path: ig-src }

      - name: Checkout publications config (publish-setup + templates; read-only)
        uses: actions/checkout@v4
        with: { repository: hl7au/publications, ref: au-pipeline-config, path: publications }

      - name: Checkout history template
        uses: actions/checkout@v4
        with: { repository: HL7/fhir-ig-history-template, path: fhir-history }

      - name: Checkout IG registry
        uses: actions/checkout@v4
        with: { repository: hl7au/ig-registry, path: ig-registry }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }

      - name: Download the PR 1330 review jar
        run: |
          curl -sSL -o publisher.jar "$JAR_URL"
          sha256sum publisher.jar
          # confirm this is the reworked box (resource shipped in the jar), not the first-cut A2
          unzip -l publisher.jar | grep -q "web/publish-box.js" || { echo "::error::publisher.jar does not contain web/publish-box.js"; exit 1; }

      - name: Seed lean -web from LIVE prod root files
        run: |
          mkdir -p webroot/fhir
          cp publications/publish-setup.json webroot/publish-setup.json
          curl -sS -o webroot/fhir/package-list.json    https://hl7.org.au/fhir/package-list.json
          curl -sS -o webroot/fhir/package-feed.xml     https://hl7.org.au/fhir/package-feed.xml
          curl -sS -o webroot/fhir/publication-feed.xml https://hl7.org.au/fhir/publication-feed.xml
          curl -sS -o webroot/package-registry.json     https://hl7.org.au/package-registry.json || true
          node -e 'const fs=require("fs");const p="webroot/fhir/package-list.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));d.list=d.list.filter(e=>![process.env.VER_A,process.env.VER_B].includes(e.version));fs.writeFileSync(p,JSON.stringify(d,null,2));'
          rm -f ig-src/package-list.json

      - name: Cache FHIR package cache
        uses: actions/cache@v4
        with:
          path: ~/.fhir
          key: fhir-cache-dynamic-publish-box-${{ github.run_id }}
          restore-keys: fhir-cache-dynamic-publish-box-

      # go-publish requires a pre-rendered source (ig-src/output + qa.json); without the combined
      # jar's -reuse-build it also re-renders internally, which is why each publish is slow here.
      - name: Render + publish version A (working) into the webroot
        run: |
          node -e 'const fs=require("fs");const p="ig-src/publication-request.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));d.version=process.env.VER_A;d.path="http://hl7.org.au/fhir/"+process.env.VER_A;d.mode="working";d.desc="Dynamic publish box preview build (v"+process.env.VER_A+")";d["allow-current-dependencies"]=true;fs.writeFileSync(p,JSON.stringify(d,null,2));'
          sed -i 's#<version value="[^"]*"/>#<version value="'"$VER_A"'"/>#' ig-src/input/ig.xml
          java -jar publisher.jar -ig "$PWD/ig-src" -publish "http://hl7.org.au/fhir/$VER_A" -tx "$TX_SERVER"
          java -jar publisher.jar -go-publish -source "$PWD/ig-src" -web "$PWD/webroot" \
            -history "$PWD/fhir-history" -registry "$PWD/ig-registry/fhir-ig-list.json" \
            -templates "$PWD/publications/templates" -temp "$PWD/temp-a" -tx "$TX_SERVER"

      - name: Record version A state (for the zero-churn proof)
        run: |
          test -f "webroot/fhir/$VER_A/publish-box-pages.json" || { echo "::error::version A pages manifest missing"; exit 1; }
          test -f webroot/fhir/package-list.js || { echo "::error::package-list.js missing"; exit 1; }
          test -f webroot/fhir/publish-box.js || { echo "::error::publish-box.js missing"; exit 1; }
          grep -q "class=\"fhir-pb\" data-pb-fmt=\"1\" data-pb-version=\"$VER_A\"" "webroot/fhir/$VER_A/index.html" || { echo "::error::version A pages not baked with dynamic markup"; exit 1; }
          (cd "webroot/fhir/$VER_A" && find . -type f -exec md5sum {} + | sort) > /tmp/verA-before.md5
          wc -l /tmp/verA-before.md5

      - name: Render + publish version B (milestone) into the SAME webroot
        run: |
          node -e 'const fs=require("fs");const p="ig-src/publication-request.json";const d=JSON.parse(fs.readFileSync(p,"utf8"));d.version=process.env.VER_B;d.path="http://hl7.org.au/fhir/"+process.env.VER_B;d.mode="milestone";d.desc="Dynamic publish box preview build (v"+process.env.VER_B+")";fs.writeFileSync(p,JSON.stringify(d,null,2));'
          sed -i 's#<version value="[^"]*"/>#<version value="'"$VER_B"'"/>#' ig-src/input/ig.xml
          rm -rf ig-src/output
          java -jar publisher.jar -ig "$PWD/ig-src" -publish "http://hl7.org.au/fhir/$VER_B" -tx "$TX_SERVER"
          java -jar publisher.jar -go-publish -source "$PWD/ig-src" -web "$PWD/webroot" \
            -history "$PWD/fhir-history" -registry "$PWD/ig-registry/fhir-ig-list.json" \
            -templates "$PWD/publications/templates" -temp "$PWD/temp-b" -tx "$TX_SERVER"

      - name: "Zero-churn proof: publishing B rewrote nothing in A's folder"
        run: |
          (cd "webroot/fhir/$VER_A" && find . -type f -exec md5sum {} + | sort) > /tmp/verA-after.md5
          if ! diff -q /tmp/verA-before.md5 /tmp/verA-after.md5; then
            echo "::error::version A's folder changed when B was published"; diff /tmp/verA-before.md5 /tmp/verA-after.md5 | head -40; exit 1
          fi
          echo "ZERO-CHURN VERIFIED: $(wc -l < /tmp/verA-before.md5) files in $VER_A byte-identical after $VER_B was published"
          grep -q "data-pb-current=\"$VER_B\"" "webroot/fhir/index.html" || { echo "::error::root copy is not version B"; exit 1; }

      - name: Preview fixups (history template assets; preview-only)
        run: |
          d=webroot/fhir
          cp -a fhir-history/assets-hist fhir-history/dist-hist "$d/" 2>/dev/null || true
          cp -a fhir-history/history.js fhir-history/history-cm.js fhir-history/history.css \
                fhir-history/fhir.css fhir-history/jquery-ui.css fhir-history/jquery-ui.js \
                fhir-history/cc0.png "$d/" 2>/dev/null || true

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to the S3 previews channel (slug-scoped)
        run: |
          aws configure set default.s3.max_concurrent_requests 64
          aws configure set default.s3.max_queue_size 10000
          rm -f webroot/publish-setup.json
          aws s3 sync ./webroot "s3://$PREVIEWS_BUCKET/$SLUG/" --delete --only-show-errors

      - name: Report preview URLs
        run: |
          s3base="http://$PREVIEWS_BUCKET.s3-website-$AWS_REGION.amazonaws.com/$SLUG"
          dnsbase="https://previews.hl7.org.au/$SLUG"
          {
            echo "### Dynamic publish box preview (PR 1330 review jar)"
            echo "- superseded past version (baked accurate at its publication, corrected at view time): $s3base/fhir/$VER_A/index.html"
            echo "- current version at the root (script changes nothing): $s3base/fhir/index.html"
            echo "- current version in its permanent folder: $s3base/fhir/$VER_B/index.html"
            echo "- directory of versions: $s3base/fhir/history.html"
            echo "- support files: $s3base/fhir/package-list.js and $s3base/fhir/publish-box.js"
            echo "- page manifest: $s3base/fhir/$VER_A/publish-box-pages.json"
            echo ""
            echo "_View-source any $VER_A page: the baked statement is the accurate as-published text"
            echo "(no placeholder, no inline script); disable JS to see exactly that. Same paths resolve"
            echo "under $dnsbase once previews.hl7.org.au DNS is in use._"
          } >> "$GITHUB_STEP_SUMMARY"
