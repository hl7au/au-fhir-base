name: AU Base build → review zip → gated publish

# Fast working-build pipeline (GitHub-hosted, no full S3 sync, no EC2).
#   1. build  : render the IG + go-publish (working mode) against a LIGHTWEIGHT -web
#               (root files only), then upload the result as a reviewable zip artifact.
#   2. publish: gated by the `production` environment (required reviewers) — downloads the
#               artifact and `aws s3 sync`s it to the bucket. No manual copy.
#
# For routine working releases (previews/ballots). Milestones still use the full-tree path.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/branch of au-fhir-base to build"
        default: master
      publish:
        description: "Run the gated publish job after build"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: au-base-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container: hl7fhir/ig-publisher-base
    steps:
      - name: Checkout au-fhir-base (the IG)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: au-fhir-base

      - name: Checkout publications (publish-setup.json + templates)
        uses: actions/checkout@v4
        with:
          repository: hl7au/publications
          path: publications

      - name: Checkout history template
        uses: actions/checkout@v4
        with:
          repository: HL7/fhir-ig-history-template
          path: fhir-history

      - name: Checkout IG registry
        uses: actions/checkout@v4
        with:
          repository: hl7au/ig-registry
          path: ig-registry

      - name: Update IG Publisher
        working-directory: au-fhir-base
        run: ./_updatePublisher.sh -f -y

      - name: Render the IG
        working-directory: au-fhir-base
        run: java -jar input-cache/publisher.jar -ig . -tx https://txreg.azurewebsites.net/txdev

      - name: Build lightweight -web (ROOT FILES ONLY — no 15GB sync)
        run: |
          mkdir -p webroot/fhir
          cp publications/publish-setup.json webroot/publish-setup.json
          curl -sS -o webroot/fhir/package-list.json   https://hl7.org.au/fhir/package-list.json
          curl -sS -o webroot/fhir/package-feed.xml      https://hl7.org.au/fhir/package-feed.xml
          curl -sS -o webroot/fhir/publication-feed.xml  https://hl7.org.au/fhir/publication-feed.xml
          curl -sS -o webroot/package-registry.json      https://hl7.org.au/package-registry.json || true
          # publisher requires the source to NOT contain package-list.json
          rm -f au-fhir-base/package-list.json

      - name: go-publish (working) into -web
        run: |
          java -jar au-fhir-base/input-cache/publisher.jar -go-publish \
            -source ./au-fhir-base -web ./webroot \
            -history ./fhir-history -registry ./ig-registry/fhir-ig-list.json \
            -templates ./publications/templates -temp ./temp \
            -tx https://txreg.azurewebsites.net/txdev

      - name: Package site for review
        run: |
          cd webroot && zip -qr ../site-${{ inputs.ref }}.zip fhir
          echo "Zipped $(du -h ../site-${{ inputs.ref }}.zip | cut -f1)"

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ inputs.ref }}
          path: site-${{ inputs.ref }}.zip
          retention-days: 14

  publish:
    needs: build
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    environment: production   # configure required reviewers on this environment to gate the push
    steps:
      - name: Download reviewed site
        uses: actions/download-artifact@v4
        with:
          name: site-${{ inputs.ref }}

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::966489602583:role/ghactions_publications_oidc
          aws-region: ap-southeast-2

      - name: Unzip + sync to S3 (additive; no --delete)
        run: |
          unzip -q site-${{ inputs.ref }}.zip -d out
          aws s3 sync out/fhir s3://hl7au-fhir-ig/fhir --only-show-errors
