name: AU Base WORKING build → review → preview → gated publish

# Routine WORKING releases (previews / ballots / drafts). Fast, GitHub-hosted, lean — no full
# S3 sync, no self-hosted runner. A working build only writes the new version + the regenerated
# root (history/registry/feeds), so it never needs old version folders locally.
#
# TRIGGERS
#   - push to master / PR to master  → build + review zip + per-ref GitHub Pages preview (NO prod publish)
#   - manual workflow_dispatch        → same, and (with publish=true) the gated prod publish
#
# INPUTS this build consumes, and what each provides (kept deliberately minimal):
#   - au-fhir-base (this repo)      : the IG source — ig.ini/ig.xml, input/, _updatePublisher.sh,
#                                     and publication-request.json (mode + the publish path).
#   - KyleOps/publications@au-pipeline-config  → publish-setup.json (website/feeds/layout config,
#                                     incl. server=cloud + dynamic-publish-box) + templates/
#                                     (header/preamble/postamble page chrome). NOTHING else is used.
#                                     TEMP fork+branch: revert to hl7au/publications once the config
#                                     + custom jar are merged. Sparse-checked-out to just those paths.
#   - HL7/fhir-ig-history-template  : history.html / history.js template for go-publish -history.
#   - hl7au/ig-registry             : fhir-ig-list.json for go-publish -registry.
#   - combined custom publisher.jar : KyleOps/fhir-ig-publisher release (5 opt-in, unmerged features:
#                                     #1327 cloud redirects, A2 dynamic publish-box + page-versions,
#                                     skip-version-tree, A3 source viewers, C -reuse-build). TEMP
#                                     until merged — then revert to ./_updatePublisher.sh -f -y.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/branch of au-fhir-base to build"
        default: master
      publish:
        description: "Run the gated prod publish after build + review"
        type: boolean
        default: false

permissions:
  id-token: write   # OIDC → AWS (publish job only)
  contents: write   # push the preview to the gh-pages branch
  pull-requests: write

concurrency:
  group: au-base-publish   # shared with the milestone pipeline — never publish two at once
  cancel-in-progress: false

env:
  PUBLISHER_JAR_URL: https://github.com/KyleOps/fhir-ig-publisher/releases/download/au-pipeline-combined/publisher.jar
  PUBLICATIONS_REPO: KyleOps/publications        # TEMP: revert to hl7au/publications once merged
  PUBLICATIONS_REF: au-pipeline-config           # TEMP: revert to (default branch) once merged
  TX_SERVER: https://tx.fhir.org

jobs:
  build:
    runs-on: ubuntu-latest
    container: hl7fhir/ig-publisher-base
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
      ver: ${{ steps.render.outputs.ver }}
    steps:
      - name: Compute a filesystem-safe label for this build (branch / pr-N / dispatch ref)
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            slug="pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slug="${{ inputs.ref }}"
          else
            slug="${{ github.ref_name }}"
          fi
          slug=$(echo "$slug" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Build label: $slug"

      - name: Checkout au-fhir-base (the IG source)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          path: au-fhir-base

      - name: Checkout publications — publish-setup.json + templates/ ONLY (sparse)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUBLICATIONS_REPO }}
          ref: ${{ env.PUBLICATIONS_REF }}
          path: publications
          sparse-checkout: |
            publish-setup.json
            templates
          sparse-checkout-cone-mode: false

      - name: Checkout history template (go-publish -history)
        uses: actions/checkout@v4
        with: { repository: HL7/fhir-ig-history-template, path: fhir-history }

      - name: Checkout IG registry (go-publish -registry)
        uses: actions/checkout@v4
        with: { repository: hl7au/ig-registry, path: ig-registry }

      - name: Fetch combined custom IG Publisher jar (TEMPORARY — until the 5 PRs merge)
        working-directory: au-fhir-base
        run: |
          # TEMP: until the opt-in publisher changes merge upstream and ship in a release, use the
          # combined jar. Revert to `./_updatePublisher.sh -f -y` once they're in the released jar.
          mkdir -p input-cache
          curl -sSL -o input-cache/publisher.jar "$PUBLISHER_JAR_URL"
          echo "publisher.jar: $(du -h input-cache/publisher.jar | cut -f1)"

      - name: Render the IG (PUBLICATION mode → go-publish -reuse-build adopts it, lever C)
        id: render
        working-directory: au-fhir-base
        run: |
          # Render directly to the final publish path so the output is publishable and go-publish
          # can reuse it (no second render). Backward compatible: an old jar that ignores
          # -reuse-build simply re-renders.
          PUBPATH=$(grep -o '"path"[^,}]*' publication-request.json | head -1 | sed 's/.*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "Publication path: $PUBPATH"
          echo "ver=${PUBPATH##*/}" >> "$GITHUB_OUTPUT"   # version folder name, for the preview deep-link
          java -jar input-cache/publisher.jar -ig . -publish "$PUBPATH" -tx "$TX_SERVER"

      - name: Build lightweight -web (ROOT FILES ONLY — no 15GB sync)
        run: |
          mkdir -p webroot/fhir
          cp publications/publish-setup.json webroot/publish-setup.json
          curl -sS -o webroot/fhir/package-list.json      https://hl7.org.au/fhir/package-list.json
          curl -sS -o webroot/fhir/package-feed.xml       https://hl7.org.au/fhir/package-feed.xml
          curl -sS -o webroot/fhir/publication-feed.xml   https://hl7.org.au/fhir/publication-feed.xml
          curl -sS -o webroot/package-registry.json       https://hl7.org.au/package-registry.json || true
          # publisher requires the source to NOT contain package-list.json
          rm -f au-fhir-base/package-list.json

      - name: go-publish (working) into -web
        run: |
          # ABSOLUTE paths are required: IGReleaseRedirectionBuilder strips the (always-absolutized)
          # web-root prefix off the version dest folder via substring, so a RELATIVE dest path throws
          # StringIndexOutOfBounds (Range [59,48)). Passing absolute paths keeps dest + root co-rooted.
          java -jar "$GITHUB_WORKSPACE/au-fhir-base/input-cache/publisher.jar" -go-publish -reuse-build \
            -source "$GITHUB_WORKSPACE/au-fhir-base" -web "$GITHUB_WORKSPACE/webroot" \
            -history "$GITHUB_WORKSPACE/fhir-history" -registry "$GITHUB_WORKSPACE/ig-registry/fhir-ig-list.json" \
            -templates "$GITHUB_WORKSPACE/publications/templates" -temp "$GITHUB_WORKSPACE/temp" \
            -tx "$TX_SERVER"

      - name: Package site for review (tar — the ig-publisher-base container has no zip)
        run: |
          tar -czf "$GITHUB_WORKSPACE/site-${{ steps.meta.outputs.slug }}.tar.gz" -C webroot fhir
          echo "Archived $(du -h "$GITHUB_WORKSPACE/site-${{ steps.meta.outputs.slug }}.tar.gz" | cut -f1)"

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ steps.meta.outputs.slug }}
          path: site-${{ steps.meta.outputs.slug }}.tar.gz
          retention-days: 14

  # Per-branch / per-PR live PREVIEW on GitHub Pages (a real URL per build).
  # Deploys to the gh-pages branch under previews/<slug>/ so multiple branches' previews coexist.
  # URL: https://<owner>.github.io/<repo>/previews/<slug>/fhir/<version>/index.html
  # REQUIRES: GitHub Pages enabled on this repo with source = gh-pages branch (one-time settings step).
  # CAVEAT: pages bake absolute hl7.org.au canonical URLs and Pages does not run the CloudFront
  # `fhir-canonical` function, so cross-page/version links resolve to PROD, not the preview — good
  # for "does the new version render", not for exercising canonical/version redirects.
  preview-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Unpack + add a preview-only root redirect
        run: |
          mkdir -p preview && tar -xzf "site-${{ needs.build.outputs.slug }}.tar.gz" -C preview
          # The lean build produces /fhir/<version>/ + /fhir/history.html but NOT /fhir/index.html
          # (that's prod's current-version landing, not built here). Add a preview-only redirect so
          # the bare …/fhir/ URL lands on this build's new version instead of 404ing.
          if [ ! -f preview/fhir/index.html ]; then
            printf '<!doctype html><meta http-equiv="refresh" content="0; url=%s/index.html"><a href="%s/index.html">%s</a>\n' \
              "${{ needs.build.outputs.ver }}" "${{ needs.build.outputs.ver }}" "${{ needs.build.outputs.ver }}" \
              > preview/fhir/index.html
          fi
      - name: Deploy preview to gh-pages/previews/<slug>
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: previews/${{ needs.build.outputs.slug }}
          keep_files: true          # don't wipe other branches' previews
          commit_message: "preview: ${{ needs.build.outputs.slug }} (${{ github.sha }})"
      - name: Preview URL
        run: |
          base="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/${{ needs.build.outputs.slug }}/fhir"
          {
            echo "### Preview (requires GitHub Pages enabled, source = gh-pages branch)";
            echo "- new version: $base/${{ needs.build.outputs.ver }}/index.html";
            echo "- directory of versions: $base/history.html";
            echo "- (bare $base/ redirects to the new version)";
          } >> "$GITHUB_STEP_SUMMARY"

  # Promote to PROD — gated by the `production` environment (required reviewers). Only on an
  # explicit manual dispatch with publish=true; push/PR builds never publish.
  publish:
    needs: build   # not preview-pages: a Pages-deploy hiccup must not block prod; the production env is the gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download reviewed site
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::966489602583:role/ghactions_publications_oidc
          aws-region: ap-southeast-2
      # additive: uploads the new version dir (incl. its full-ig.zip + npm package.tgz) and the
      # regenerated root (history.html, registry, feeds). Never --delete (old versions stay put).
      - name: Unpack + sync to S3 (additive; no --delete)
        run: |
          mkdir -p out && tar -xzf "site-${{ needs.build.outputs.slug }}.tar.gz" -C out
          aws s3 sync out/fhir s3://hl7au-fhir-ig/fhir --only-show-errors
