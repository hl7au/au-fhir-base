name: AU Base MILESTONE build → review → preview → gated publish

# Milestone releases (the R-numbered trial-use "current": e.g. 6.1.0). Requires the IG's
# publication-request.json mode = "milestone".
#
# NOTE: this pipeline no longer uses a warm /mirror, a self-hosted runner, or any full S3 sync.
# It once did: a milestone rewrote the publish-box banner in EVERY past version, so the whole
# version tree had to be present locally. With website.dynamic-publish-box enabled the banner +
# "Page versions" list render client-side from package-list.json, so every old version's pages are
# byte-identical regardless of which version is current — the combined jar therefore SKIPS the
# past-version loop entirely and a milestone touches only the new version + root. It is now exactly
# as lean as a working build: GitHub-hosted, root-files-only ./webroot, no mirror, no EC2.
#
# TRIGGERS
#   - push of a tag                   → build + review zip + per-tag GitHub Pages preview, then the
#                                       publish job (gated by the `production` environment).
#   - manual workflow_dispatch        → same; publish runs with publish=true (still env-gated).
#
# INPUTS (identical to the working pipeline — see build-review-publish.yml for the per-input notes):
#   au-fhir-base (IG src) · KyleOps/publications@au-pipeline-config (publish-setup.json + templates) ·
#   HL7/fhir-ig-history-template · hl7au/ig-registry · combined custom publisher.jar.

on:
  push:
    tags: ['**']
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag/branch of au-fhir-base to build (the milestone)"
        required: true
      publish:
        description: "Run the gated prod publish after build + review"
        type: boolean
        default: false

permissions:
  id-token: write   # OIDC → AWS (publish job only)
  contents: write   # push the preview to the gh-pages branch

concurrency:
  group: au-base-publish   # shared with the working pipeline — never publish two at once
  cancel-in-progress: false

env:
  PUBLISHER_JAR_URL: https://github.com/KyleOps/fhir-ig-publisher/releases/download/au-pipeline-combined/publisher.jar
  PUBLICATIONS_REPO: KyleOps/publications        # TEMP: revert to hl7au/publications once merged
  PUBLICATIONS_REF: au-pipeline-config           # TEMP: revert to (default branch) once merged
  TX_SERVER: https://tx.fhir.org

jobs:
  build:
    runs-on: ubuntu-latest
    container: hl7fhir/ig-publisher-base
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
    steps:
      - name: Compute a filesystem-safe label for this build (tag / dispatch ref)
        id: meta
        run: |
          slug="${{ inputs.ref || github.ref_name }}"
          slug=$(echo "$slug" | tr '/' '-' | tr -cd 'A-Za-z0-9._-')
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "Milestone label: $slug"

      - name: Checkout au-fhir-base (the IG source)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}
          path: au-fhir-base

      - name: Checkout publications — publish-setup.json + templates/ ONLY (sparse)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PUBLICATIONS_REPO }}
          ref: ${{ env.PUBLICATIONS_REF }}
          path: publications
          sparse-checkout: |
            publish-setup.json
            templates
          sparse-checkout-cone-mode: false

      - name: Checkout history template (go-publish -history)
        uses: actions/checkout@v4
        with: { repository: HL7/fhir-ig-history-template, path: fhir-history }

      - name: Checkout IG registry (go-publish -registry)
        uses: actions/checkout@v4
        with: { repository: hl7au/ig-registry, path: ig-registry }

      - name: Fetch combined custom IG Publisher jar (TEMPORARY — until the 5 PRs merge)
        working-directory: au-fhir-base
        run: |
          mkdir -p input-cache
          curl -sSL -o input-cache/publisher.jar "$PUBLISHER_JAR_URL"
          echo "publisher.jar: $(du -h input-cache/publisher.jar | cut -f1)"

      - name: Render the IG (PUBLICATION mode → go-publish -reuse-build adopts it, lever C)
        working-directory: au-fhir-base
        run: |
          PUBPATH=$(grep -o '"path"[^,}]*' publication-request.json | head -1 | sed 's/.*:[[:space:]]*"\([^"]*\)".*/\1/')
          echo "Publication path: $PUBPATH"
          java -jar input-cache/publisher.jar -ig . -publish "$PUBPATH" -tx "$TX_SERVER"

      - name: Build lightweight -web (ROOT FILES ONLY — dynamic-publish-box ⇒ no version tree needed)
        run: |
          mkdir -p webroot/fhir
          cp publications/publish-setup.json webroot/publish-setup.json
          curl -sS -o webroot/fhir/package-list.json      https://hl7.org.au/fhir/package-list.json
          curl -sS -o webroot/fhir/package-feed.xml       https://hl7.org.au/fhir/package-feed.xml
          curl -sS -o webroot/fhir/publication-feed.xml   https://hl7.org.au/fhir/publication-feed.xml
          curl -sS -o webroot/package-registry.json       https://hl7.org.au/package-registry.json || true
          rm -f au-fhir-base/package-list.json

      - name: go-publish (milestone) into -web
        run: |
          # dynamic-publish-box (in publish-setup.json) makes the publisher skip the per-past-version
          # rewrite — so this milestone touches only the new version + root, no version tree required.
          # ABSOLUTE paths required (see build-review-publish.yml): a relative dest folder crashes
          # IGReleaseRedirectionBuilder's substring (Range [59,48)).
          java -jar "$GITHUB_WORKSPACE/au-fhir-base/input-cache/publisher.jar" -go-publish -reuse-build \
            -source "$GITHUB_WORKSPACE/au-fhir-base" -web "$GITHUB_WORKSPACE/webroot" \
            -history "$GITHUB_WORKSPACE/fhir-history" -registry "$GITHUB_WORKSPACE/ig-registry/fhir-ig-list.json" \
            -templates "$GITHUB_WORKSPACE/publications/templates" -temp "$GITHUB_WORKSPACE/temp" -tx "$TX_SERVER"

      - name: Package site for review (tar — the ig-publisher-base container has no zip)
        run: |
          tar -czf "$GITHUB_WORKSPACE/site-${{ steps.meta.outputs.slug }}.tar.gz" -C webroot fhir
          echo "Archived $(du -h "$GITHUB_WORKSPACE/site-${{ steps.meta.outputs.slug }}.tar.gz" | cut -f1)"

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ steps.meta.outputs.slug }}
          path: site-${{ steps.meta.outputs.slug }}.tar.gz
          retention-days: 14

  # Per-tag live PREVIEW on GitHub Pages (see build-review-publish.yml for setup + the absolute-URL caveat).
  preview-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Unpack
        run: mkdir -p preview && tar -xzf "site-${{ needs.build.outputs.slug }}.tar.gz" -C preview
      - name: Deploy preview to gh-pages/previews/<slug>
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: previews/${{ needs.build.outputs.slug }}
          keep_files: true
          commit_message: "preview: milestone ${{ needs.build.outputs.slug }} (${{ github.sha }})"
      - name: Preview URL
        run: |
          echo "Preview: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/${{ needs.build.outputs.slug }}/fhir/" >> "$GITHUB_STEP_SUMMARY"

  # Promote to PROD — gated by the `production` environment (required reviewers). Runs on a tag push
  # (awaiting approval) or a manual dispatch with publish=true.
  publish:
    needs: build   # not preview-pages: a Pages-deploy hiccup must not block prod; the production env is the gate
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download reviewed site
        uses: actions/download-artifact@v4
        with: { name: "site-${{ needs.build.outputs.slug }}" }
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::966489602583:role/ghactions_publications_oidc
          aws-region: ap-southeast-2
      # Uploads the new version (incl. full-ig.zip + npm package.tgz) + regenerated root. With
      # dynamic-publish-box there are NO rewritten old-version files to upload. Additive; never --delete.
      - name: Unpack + sync to S3 (additive; no --delete)
        run: |
          mkdir -p out && tar -xzf "site-${{ needs.build.outputs.slug }}.tar.gz" -C out
          aws s3 sync out/fhir s3://hl7au-fhir-ig/fhir --only-show-errors
